<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJK: Cursed Battle v3</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-blue: #00d4ff;
            --accent-red: #ff004c;
            --sukuna-red: #960000;
        }

        body {
            margin: 0; background: var(--bg-color); color: white;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; z-index: 100;
            padding: 20px; text-align: center;
        }

        .hidden { display: none !important; }

        /* HUD */
        #game-ui { display: flex; flex-direction: column; height: 100vh; }
        .hud { display: flex; justify-content: space-between; padding: 15px; background: #111; border-bottom: 2px solid #333; }
        .stat-box { width: 45%; }
        .hp-container { height: 15px; background: #222; border: 1px solid #444; margin: 5px 0; }
        .hp-bar { height: 100%; transition: width 0.4s; }
        .ce-bar { font-size: 12px; font-weight: bold; }

        /* Log */
        #battle-log {
            flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 13px;
            background: #050505; border-bottom: 1px solid #333; display: flex; flex-direction: column;
        }
        .log-entry { margin-bottom: 5px; border-left: 3px solid var(--accent-blue); padding-left: 8px; animation: fadeIn 0.3s; }
        .special-event { color: #ffcc00; font-weight: bold; border-left-color: #ff0000; }

        /* Controles */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #000; }
        .btn {
            background: #1a1a1a; border: 1px solid #444; color: white; padding: 12px 5px;
            border-radius: 4px; display: flex; flex-direction: column; align-items: center;
            font-size: 10px; cursor: pointer;
        }
        .btn:active { background: #333; }
        .btn.awake-btn { border-color: #ff0000; background: #300; }
        .btn.disabled { opacity: 0.4; pointer-events: none; }
        .cost { font-size: 9px; color: #00d4ff; }

        /* Selección */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; overflow-y: auto; }
        .char-card { background: #151515; padding: 10px; border: 1px solid #333; border-radius: 4px; }
        .tab-btn { padding: 10px; background: #222; border: none; color: white; flex: 1; }
        .tab-btn.active { background: var(--accent-blue); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>呪術 BATTLE v3</h1>
        <button onclick="initSelection('single')" style="width:200px; padding:15px; margin:10px;">SINGLE PLAYER</button>
        <button onclick="initSelection('local')" style="width:200px; padding:15px; margin:10px;">LOCAL 1 VS 1</button>
    </div>

    <div id="selection-screen" class="screen hidden">
        <h2 id="selection-title">P1: ELIGE EQUIPO</h2>
        <div id="timer-ui" style="color:red; font-size:20px;">10</div>
        <div style="display:flex; width:100%; margin:10px 0;">
            <button id="tab-sorcerer" class="tab-btn active" onclick="switchTab('sorcerers')">HECHICEROS</button>
            <button id="tab-curse" class="tab-btn" onclick="switchTab('curses')">MALDICIONES</button>
        </div>
        <div id="char-list" class="char-grid"></div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="hud">
            <div class="stat-box">
                <div id="p1-name" style="color:var(--accent-blue);">P1</div>
                <div class="hp-container"><div id="p1-hp" class="hp-bar" style="width:100%; background: #2ecc71;"></div></div>
                <div id="p1-ce" class="ce-bar">E: 2</div>
            </div>
            <div class="stat-box" style="text-align: right;">
                <div id="p2-name" style="color:var(--accent-red);">P2</div>
                <div class="hp-container"><div id="p2-hp" class="hp-bar" style="width:100%; background: #2ecc71;"></div></div>
                <div id="p2-ce" class="ce-bar">E: 2</div>
            </div>
        </div>

        <div id="battle-log"></div>

        <div id="action-controls" class="controls">
            <button class="btn" onclick="handleInput('GN')"><span>👊 GN</span><span class="cost">0 E</span></button>
            <button class="btn" onclick="handleInput('GE')"><span>🔥 GE</span><span class="cost">1 E</span></button>
            <button class="btn" onclick="handleInput('BN')"><span>🛡️ BN</span><span class="cost">0 E</span></button>
            <button class="btn" onclick="handleInput('BE')"><span>💧 BE</span><span class="cost">1 E</span></button>
            <button class="btn" id="btn-tech" onclick="handleInput('T')"><span>⚔️ TÉCNICA</span><span class="cost">3 E</span></button>
            <button class="btn awake-btn" id="btn-awake" onclick="handleInput('A')"><span>👁️ DESPERTAR</span><span class="cost">10 E</span></button>
            <button class="btn hidden awake-btn" id="btn-ulti" onclick="handleInput('U')" style="grid-column: span 2;"><span>👹 ULTIMATE</span><span class="cost" id="cost-ulti">8 E</span></button>
        </div>
    </div>

<script>
const DATA = {
    sorcerers: [
        { id: 'yuji', name: 'Yuji Itadori', tech: 'G. Concentrado', techCost: 3, awake: 'Sukuna', awakeCost: 10 },
        { id: 'gojo', name: 'Satoru Gojo', tech: 'Seis Ojos', techCost: 3, awake: 'Vacio Infinito', awakeCost: 10 },
        { id: 'hakari', name: 'Kinji Hakari', tech: 'Puerta', techCost: 3, awake: 'Jackpot', awakeCost: 10 }
    ],
    curses: [
        { id: 'mahito', name: 'Mahito', tech: 'Transfigurar', techCost: 3, awake: 'Inspiración', awakeCost: 10 },
        { id: 'jogo', name: 'Jogo', tech: 'Bola Fuego', techCost: 3, awake: 'Ataúd', awakeCost: 8 }
    ]
};

let game = {
    mode: 'single',
    turn: 1,
    p1: { hp: 750, ce: 2, char: null, move: null, isAwake: false, awakeTurns: 0, bfProb: 25, ultActive: 0 },
    p2: { hp: 750, ce: 2, char: null, move: null, isAwake: false, awakeTurns: 0, bfProb: 25, ultActive: 0 },
    currentTab: 'sorcerers',
    selectingFor: 1,
    timerInt: null
};

// --- SELECCIÓN SECUENCIAL ---
function initSelection(mode) {
    game.mode = mode;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('selection-screen').classList.remove('hidden');
    renderCharList();
    startTimer();
}

function switchTab(tab) {
    game.currentTab = tab;
    document.getElementById('tab-sorcerer').className = tab === 'sorcerers' ? 'tab-btn active' : 'tab-btn';
    document.getElementById('tab-curse').className = tab === 'curses' ? 'tab-btn active' : 'tab-btn';
    renderCharList();
}

function renderCharList() {
    const list = document.getElementById('char-list');
    list.innerHTML = '';
    DATA[game.currentTab].forEach(char => {
        const div = document.createElement('div');
        div.className = 'char-card';
        div.innerHTML = `<strong>${char.name}</strong><br><small>${char.tech}</small>`;
        div.onclick = () => selectChar(char);
        list.appendChild(div);
    });
}

function startTimer() {
    let timeLeft = 10;
    const ui = document.getElementById('timer-ui');
    clearInterval(game.timerInt);
    game.timerInt = setInterval(() => {
        timeLeft--; ui.innerText = timeLeft;
        if(timeLeft <= 0) {
            const all = [...DATA.sorcerers, ...DATA.curses];
            selectChar(all[0]);
        }
    }, 1000);
}

function selectChar(char) {
    if(game.selectingFor === 1) {
        game.p1.char = JSON.parse(JSON.stringify(char)); // Clonar
        if(game.mode === 'single') {
            const all = [...DATA.sorcerers, ...DATA.curses];
            game.p2.char = JSON.parse(JSON.stringify(all[Math.floor(Math.random()*all.length)]));
            finishSelection();
        } else {
            game.selectingFor = 2;
            document.getElementById('selection-title').innerText = "P2: ELIGE EQUIPO";
            startTimer();
        }
    } else {
        game.p2.char = JSON.parse(JSON.stringify(char));
        finishSelection();
    }
}

function finishSelection() {
    clearInterval(game.timerInt);
    document.getElementById('selection-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    document.getElementById('p1-name').innerText = game.p1.char.name;
    document.getElementById('p2-name').innerText = game.p2.char.name;
    updateUI();
}

// --- LÓGICA DE BATALLA ---
function handleInput(move) {
    const p = game.p1;
    const cost = getCost(move, p);
    if(p.ce < cost) return;

    p.move = move;
    if(game.mode === 'single') {
        game.p2.move = cpuBrain();
        resolveTurn();
    } else {
        document.getElementById('action-controls').classList.add('hidden');
        setTimeout(() => {
            alert("Turno de Jugador 2");
            game.p2.move = cpuBrain(); // En un dispositivo físico, aquí el P2 tocaría botones.
            document.getElementById('action-controls').classList.remove('hidden');
            resolveTurn();
        }, 100);
    }
}

function getCost(move, p) {
    if(move === 'GE' || move === 'BE') return 1;
    if(move === 'T') return p.char.techCost;
    if(move === 'A') return p.char.awakeCost;
    if(move === 'U') return p.char.id === 'yuji' ? 8 : 10;
    return 0;
}

function resolveTurn() {
    const res1 = calculateDamage(game.p1, game.p2);
    const res2 = calculateDamage(game.p2, game.p1);

    game.p2.hp -= res1.dmg;
    game.p1.hp -= res2.dmg;
    game.p1.ce -= getCost(game.p1.move, game.p1);
    game.p2.ce -= getCost(game.p2.move, game.p2);

    addLog(`P1: ${res1.msg} (-${res1.dmg})`);
    addLog(`P2: ${res2.msg} (-${res2.dmg})`);

    // Reducir duraciones de Ultimate/Despertar
    if(game.p1.awakeTurns > 0) game.p1.awakeTurns--;
    if(game.p2.awakeTurns > 0) game.p2.awakeTurns--;
    
    // Efectos de Ultimate pasivos (Sukuna Shrine)
    if(game.p1.ultActive > 0) {
        game.p2.hp -= 100; addLog("Malevolent Shrine corta a P2 (-100)", "special-event");
        game.p1.ultActive--;
    }

    game.turn++;
    distributeCE();
    updateUI();
    checkWin();
}

function calculateDamage(atk, def) {
    let dmg = 0; let type = 'GN'; let msg = "";

    // Lógica Sukuna (Yuji Despierto)
    if(atk.isAwake && atk.char.id === 'yuji') {
        atk.char.tech = "Desmantelar";
        atk.char.techCost = 3;
    }

    switch(atk.move) {
        case 'GN': dmg = 50; type = 'GN'; msg = "Golpe Normal"; break;
        case 'GE': dmg = 75; type = 'GE'; msg = "Golpe Energía"; break;
        case 'T':
            if(atk.isAwake && atk.char.id === 'yuji') {
                dmg = 100; type = 'GE'; msg = "Desmantelar";
            } else if(atk.char.id === 'mahito' && atk.isAwake) {
                dmg = 150; type = 'GE'; msg = "Transfiguración Total";
                if(Math.random() < 0.1) { dmg *= 1.5; msg = "¡BLACK FLASH! ⚡"; }
            } else {
                dmg = 100; type = 'GN'; msg = atk.char.tech;
            }
            break;
        case 'A':
            atk.isAwake = true; atk.awakeTurns = 8;
            msg = "¡DESPERTAR!";
            break;
        case 'U':
            if(atk.char.id === 'yuji') {
                atk.ultActive = 3; msg = "EXPANSIÓN: MALEVOLENT SHRINE";
            }
            break;
    }

    if(def.move === 'BN' && type === 'GN') dmg = Math.max(0, dmg - 50);
    if(def.move === 'BE' && type === 'GE') dmg = Math.max(0, dmg - 75);

    return { dmg, msg };
}

function updateUI() {
    const p1 = game.p1;
    document.getElementById('p1-hp').style.width = (p1.hp/750*100) + "%";
    document.getElementById('p1-ce').innerText = `E: ${p1.ce}`;
    
    // Botones dinámicos para Despertar
    const btnTech = document.getElementById('btn-tech');
    const btnUlti = document.getElementById('btn-ulti');

    if(p1.isAwake) {
        btnTech.innerHTML = `<span>⚔️ ${p1.char.id === 'yuji' ? 'DESMANTELAR' : 'TÉCNICA'}</span><span class="cost">3 E</span>`;
        if(p1.char.id === 'yuji') btnUlti.classList.remove('hidden');
    }

    const p2 = game.p2;
    document.getElementById('p2-hp').style.width = (p2.hp/750*100) + "%";
    document.getElementById('p2-ce').innerText = `E: ${p2.ce}`;
}

function distributeCE() {
    let gain = 1;
    if(game.turn === 1) gain = 0;
    else if(game.turn % 5 === 0) gain = 3;
    else if(game.turn % 2 === 0) gain = 2;
    game.p1.ce = Math.min(15, game.p1.ce + gain);
    game.p2.ce = Math.min(15, game.p2.ce + gain);
}

function addLog(t, c="") {
    const log = document.getElementById('battle-log');
    const e = document.createElement('div');
    e.className = 'log-entry ' + c; e.innerText = t;
    log.prepend(e);
}

function cpuBrain() {
    const p = game.p2;
    if(p.ce >= 10 && !p.isAwake) return 'A';
    if(p.ce >= 3) return 'T';
    return 'GN';
}

function checkWin() {
    if(game.p1.hp <= 0 || game.p2.hp <= 0) {
        alert("BATALLA FINALIZADA");
        location.reload();
    }
}
</script>
</body>
</html>
